services:
  - type: web
    name: kiranaiq-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python scripts/train_model.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.10"
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
